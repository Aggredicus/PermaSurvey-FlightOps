name: test

on:
  push:
    branches:
      - main
      - "feature/**"
      - "quality/**"
  pull_request:
    branches:
      - main

jobs:
  test:
    name: typecheck, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Upload generated lockfile
        uses: actions/upload-artifact@v4
        with:
          name: generated-package-lock
          path: package-lock.json

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
