services:
  app:
    build:
      context: .
      target: app
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  qa:
    build:
      context: .
      target: qa
    profiles:
      - qa

  preview:
    build:
      context: .
      target: preview
    ports:
      - "8080:80"
    profiles:
      - preview

volumes:
  node_modules:
